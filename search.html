          <line x1="22" y1="22" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" class="search-input" placeholder="Painting title" id="global-search">

      </div>
      <button class="burger-btn" id="burgerMenuBtn">
        <img src="img/filter_icon-red.png">
      </button>
    </div>
  </div>
